version: "3.8"

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: clinicaradiografias
      MYSQL_USER: xpectra
      MYSQL_PASSWORD: xpectra_dev_123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./server/migrations_ods.sql:/docker-entrypoint-initdb.d/02-migrations.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_USER: xpectra
      DB_PASSWORD: xpectra_dev_123
      DB_NAME: clinicaradiografias
      JWT_SECRET: dev-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      TZ_OFFSET_MINUTES: -360
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./client:/app/client
      - ./server:/app/server
      - /app/server/node_modules

volumes:
  db_data:
