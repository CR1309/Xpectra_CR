<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XPectra-Gestion de Citas</title>
    <meta name="description" content="Panel de gestión de citas y radiografías para usuarios registrados de XPectra. Accede a tus informes y administra tu información médica.">
    <meta name="keywords" content="panel, gestión, citas, radiografías, informes médicos, usuario, XPectra">
    <meta name="author" content="XPectra">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="XPectra">
    <meta property="og:description" content="Gestion de citas.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/img/p1.jpg">
    <meta property="og:url" content="http://localhost:3000/">
  <link href="/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/vendor/bootstrap-icons/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="\img\XPectra.png">
    <script src="/vendor/bootstrap/bootstrap.bundle.min.js" defer></script>
  <script src="/scripts/notifications.js" defer></script>
    <script src="/app.js" defer></script>
    <script src="/theme-toggle.js" defer></script>
</head>
<body>
    <!-- Header unificado con blur -->
    <div id="appHeader" class="app-header">
      <div class="header-inner">
        <!-- Grupo izquierdo: navegación/contexto -->
        <div class="left-bar-btns d-flex flex-row gap-2" id="leftBarBtns">
          <a href="/landing.html" class="btn btn-outline-secondary" aria-label="Volver a inicio" title="Volver a la página principal">
            <i class="bi bi-arrow-left"></i> <span class="btn-text">Volver a inicio</span>
          </a>
          <!-- El botón de Informes/Citas/Usuarios se agregará dinámicamente por JS aquí si corresponde -->
        </div>
        <!-- Grupo derecho: acciones de sesión -->
        <div id="topBarBtns" class="d-flex flex-row gap-2">
          <button class="btn btn-outline-secondary" id="themeToggle" aria-label="Cambiar tema" title="Cambiar tema">
            <i class="bi bi-moon"></i>
          </button>
          <button class="btn btn-outline-primary" id="misInformesBtn" style="display:none;" aria-label="Mis Informes" title="Ver mis informes">
            <i class="bi bi-file-earmark-medical"></i> <span class="btn-text">Mis Informes</span>
          </button>
          <button class="btn btn-outline-secondary" id="perfilBtn" aria-label="Mi Perfil" title="Ver o editar tu perfil">
            <i class="bi bi-person-circle"></i> <span class="btn-text">Mi Perfil</span>
          </button>
          <button class="btn btn-outline-danger" id="logoutBtn" aria-label="Cerrar sesión" title="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i> <span class="btn-text">Cerrar sesión</span>
          </button>
        </div>
      </div>
    </div>

    <div class="container mt-5">
        <h1 class="neo-title">Gestion de Citas</h1>
        <!-- Login -->
        <div class="card shadow mb-4" id="loginCard">
            <div class="card-body">
                <h5 class="neo-section-title">Iniciar Sesión</h5>
                <form id="loginForm" autocomplete="on" novalidate>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Correo" id="loginCorreo" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Contraseña" id="loginContrasena" required autocomplete="current-password">
            <div id="loginHint" class="form-text small text-secondary mt-1"></div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
                <div class="mt-2 text-center">
                    <span class="text-primary" id="showRegisterBtn" style="cursor:pointer;">¿No tienes cuenta? Regístrate</span>
                </div>
            </div>
        </div>
        <!-- Registro -->
        <div class="card shadow mb-4" id="registerCard" style="display:none;">
            <div class="card-body">
                <h5 class="neo-section-title">Registro de Usuario</h5>
                <form id="registerForm" autocomplete="on" novalidate>
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Nombre de usuario" id="registerNombre" required autocomplete="username">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Correo" id="registerCorreo" required autocomplete="email">
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Contraseña" id="registerContrasena" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Registrarse</button>
                </form>
                <div class="mt-2 text-center">
                    <span class="text-primary" id="showLoginBtn" style="cursor:pointer;">¿Ya tienes cuenta? Inicia sesión</span>
                </div>
            </div>
        </div>
        <!-- Formulario Nueva Cita -->
        <div class="card shadow mb-4" id="citaCard" style="display:none;">
            <div class="card-body">
                <h5 class="neo-section-title mb-3"><i class="bi bi-calendar-plus cita-icon"></i> Nueva Cita</h5>
                <form id="citaForm" autocomplete="on" novalidate>
                    <div class="mb-4">
                        <div class="row g-3">
                            <div class="col-12">
                                <span class="fw-semibold text-secondary">Datos del Paciente</span>
                            </div>
                            <div class="col-md-6">
                                <label for="Nombre" class="form-label">Nombre</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control ios-input" placeholder="Ej: Juan" id="Nombre" required autocomplete="given-name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Apellido" class="form-label">Apellido</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control ios-input" placeholder="Ej: Pérez" id="Apellido" required autocomplete="family-name">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Fecha_Nacimiento" class="form-label">Fecha de nacimiento</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar-date"></i></span>
                                    <input type="date" class="form-control ios-input" id="Fecha_Nacimiento" required autocomplete="bday">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Sexo" class="form-label">Sexo</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                                    <select class="form-select ios-input" id="Sexo" required>
                                        <option value="" disabled selected>Selecciona</option>
                                        <option value="Masculino">Masculino</option>
                                        <option value="Femenino">Femenino</option>
                                        <option value="Otro">Otro</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Telefono" class="form-label">Teléfono</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control ios-input" placeholder="Ej: 555-123-4567" id="Telefono" required autocomplete="tel">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Correo_Electronico" class="form-label">Correo Electrónico</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control ios-input" placeholder="Ej: juan@email.com" id="Correo_Electronico" required autocomplete="email">
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="Direccion" class="form-label">Dirección</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                    <input type="text" class="form-control ios-input" placeholder="Ej: Calle 123, Ciudad" id="Direccion" required autocomplete="street-address">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="Categoria_Estudio" class="form-label">Categoría de Estudio</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-layers"></i></span>
                                    <select class="form-select ios-input" id="Categoria_Estudio" required>
                                        <option value="" disabled>Selecciona</option>
                                        <!-- Opciones se llenan por JS -->
                                    </select>
                                </div>
                            </div>
                        </div>  
                    </div>
                    <hr class="my-4">
                    <div class="mb-3">
                        <span class="fw-semibold text-secondary">Detalles de la Cita</span>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="Fecha_Cita" class="form-label">Fecha de la cita</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                                <input type="date" class="form-control ios-input" id="Fecha_Cita" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="Hora_Cita" class="form-label">Hora de la cita</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-clock"></i></span>
                                <input type="time" class="form-control ios-input" id="Hora_Cita" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="Motivo" class="form-label">Motivo de la cita</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-chat-left-text"></i></span>
                                <input type="text" class="form-control ios-input" id="Motivo" placeholder="Ej: Radiografía dental, control anual..." maxlength="100">
                            </div>
                        </div>
                        <!-- Campos de pago y tipo de pago se agregan por JS -->
                    </div>
                    <div class="row g-3 mt-2" id="extraPagoCampos"></div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Agendar Cita</button>
                </form>
            </div>
        </div>

        <!-- NUEVO: Modal Mis Informes -->
        <div class="modal fade" id="misInformesModal" tabindex="-1" aria-labelledby="misInformesModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass">
              <div class="modal-header">
                <h5 class="modal-title" id="misInformesModalLabel"><i class="bi bi-file-earmark-medical"></i> Mis Informes</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <div class="modal-body">
                <div id="misInformesCont"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal Perfil Usuario/Admin -->
        <div class="modal fade" id="perfilModal" tabindex="-1" aria-labelledby="perfilModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass perfil-modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="perfilModalLabel"><i class="bi bi-person-circle"></i> Mi Perfil</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <form id="perfilForm" enctype="multipart/form-data">
                <div class="modal-body">
                  <div class="d-flex flex-column align-items-center mb-4">
                    <img id="perfilFotoPreview" src="/img/XPectra.png" alt="Foto de perfil" class="perfil-foto-preview mb-2">
                    <label for="perfilFoto" class="btn btn-link p-0">Cambiar foto</label>
                    <input type="file" id="perfilFoto" accept="image/*" class="d-none">
                  </div>
                  <div class="row g-3">
                    <div class="col-12 col-md-6">
                      <label class="form-label">Nombre de usuario</label>
                      <input type="text" class="form-control" id="perfilNombreUsuario" required>
                    </div>
                    <div class="col-12 col-md-6">
                      <label class="form-label">Correo</label>
                      <input type="email" class="form-control" id="perfilCorreo" disabled>
                    </div>
                  </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                  <button type="button" class="btn btn-outline-danger" id="borrarPerfilBtn"><i class="bi bi-trash"></i> Borrar</button>
                  <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Modal Galería de Radiografías -->
        <div class="modal fade" id="galeriaModal" tabindex="-1" aria-labelledby="galeriaModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass galeria-modal-content">
              <div class="modal-header">
                <h5 class="modal-title" id="galeriaModalLabel"><i class="bi bi-images"></i> Galería de Radiografías</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <div class="modal-body galeria-modal-body" id="galeriaBody">
                <!-- Aquí se cargan las imágenes -->
              </div>
            </div>
          </div>
        </div>

        <!-- Modal Edición de Cita -->
        <div class="modal fade" id="editCitaModal" tabindex="-1" aria-labelledby="editCitaModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass">
              <div class="modal-header">
                <h5 class="modal-title" id="editCitaModalLabel">Editar Cita</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <form id="editCitaForm">
                <div class="modal-body">
                  <div class="mb-3">
                    <label for="editFecha_Cita" class="form-label">Fecha de la cita</label>
                    <input type="date" class="form-control" id="editFecha_Cita" required>
                  </div>
                  <div class="mb-3">
                    <label for="editHora_Cita" class="form-label">Hora de la cita</label>
                    <input type="time" class="form-control" id="editHora_Cita" required>
                  </div>
                  <div class="mb-3">
                    <label for="editMotivo" class="form-label">Motivo</label>
                    <input type="text" class="form-control" id="editMotivo" maxlength="100">
                  </div>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                  <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- Modal Citas Programadas -->
        <div class="modal fade" id="citasTabModal" tabindex="-1" aria-labelledby="citasTabModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass">
              <div class="modal-header">
                <h5 class="modal-title" id="citasTabModalLabel"><i class="bi bi-list-ul"></i> Citas Programadas</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
                <div id="citasListTab" class="row g-3"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Modal Usuarios Registrados (solo admin) -->
        <div class="modal fade" id="usuariosTabModal" tabindex="-1" aria-labelledby="usuariosTabModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-xl modal-dialog-centered modal-responsive">
            <div class="modal-content ios-glass">
              <div class="modal-header">
                <h5 class="modal-title" id="usuariosTabModalLabel"><i class="bi bi-people"></i> Usuarios Registrados</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
              </div>
              <div class="modal-body" style="max-height:70vh;overflow-y:auto;">
                <div id="usuariosList" class="row g-3"></div>
              </div>
            </div>
          </div>
        </div>


        <!-- Agregar mensaje de error -->
        <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
    </div>
    </div>
  <div id="themeLive" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
