<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Informes y Radiografías</title>
    <link rel="stylesheet" href="admin_informes.css">
</head>
<body>
    <h1>Gestión de Informes y Radiografías</h1>
    <div id="msg"></div>
    <form id="form-informe" enctype="multipart/form-data">
        <label>
            Selecciona una cita pendiente:
            <select id="cita" name="cita" required></select>
        </label>
        <div id="paciente-info"></div>
        <label>
            Imagen de radiografía:
            <input type="file" id="imagen" name="imagen" accept="image/*" required>
        </label>
        <button type="button" id="analizar-ia" style="margin-bottom:10px;">Analizar con IA</button>
        <div class="preview" id="preview"></div>
        <div id="ia-label-container" class="ia-result-card">
            <!-- Aquí se mostrarán los resultados de la IA -->
        </div>
        <label>
            Diagnóstico:
            <textarea name="Diagnostico" id="Diagnostico" required></textarea>
        </label>
        <label>
            Recomendaciones:
            <textarea name="Recomendaciones" id="Recomendaciones"></textarea>
        </label>
        <label>
            Predicción IA (opcional):
            <input type="text" name="IA_Prediccion" id="IA_Prediccion">
        </label>
        <label>
            Fecha del informe:
            <input type="date" name="Fecha_Informe" id="Fecha_Informe" required>
        </label>
        <button type="submit">Guardar Informe</button>
    </form>
    <h2>Informes existentes</h2>
    <div id="informes-lista">
        <table id="tabla-informes">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Paciente</th>
                    <th>Fecha cita</th>
                    <th>Hora</th>
                    <th>Categoría</th>
                    <th>Diagnóstico</th>
                    <th>Fecha informe</th>
                    <th>Imagen</th>
                </tr>
            </thead>
            <tbody>
                <!-- Se llenará por JS -->
            </tbody>
        </table>
    </div>
    <!-- Scripts de TensorFlow y Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="admin_informes.js"></script>
    <!-- El script de configuración IA se movió a admin_informes.js -->
</body>
</html>
